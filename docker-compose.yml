services:
  postgres:
    image: postgres:17-alpine
    container_name: the-compass-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: the_compass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - the-compass-postgres:/var/lib/postgresql/data

volumes:
  the-compass-postgres:
